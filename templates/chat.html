<!DOCTYPE html>
<html>
<head>
    <title>Weather Assistant</title>
</head>
<body>
    <h1>🌤️ Weather Assistant</h1>

    <div class="chat-box">
        {% if messages %}
            {% for msg in messages %}
                {% if msg.type == 'human' %}
                    <div class="message user">
                        {{ msg.content }}
                    </div>
                {% elif msg.type == 'ai' %}
                    <div class="message agent">
                        {{ msg.content }}
                    </div>
                {% endif %}
            {% endfor %}
        {% else %}
            <p style="color: #999; text-align: center;">Ask me about the weather!</p>
        {% endif %}
    </div>

    <form method="POST" action="/send" class="input-form" id="chatForm">
        <input type="text" name="message" placeholder="Ask about the weather..."/>
        <button type="submit">Send</button>
    </form>

    <a href="/clear">
        <button type="button" class="clear-btn">New Conversation</button>
    </a>
</body>
</html>
