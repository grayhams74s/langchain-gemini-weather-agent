<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Assistant</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #202124;
            --muted: #72757a;
            --line: #e2e5e9;
            --surface: #ffffff;
            --soft-blue: #dff2ff;
            --user: #174a8b;
            --accent: #2769d8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #fafafa;
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        button,
        input {
            font: inherit;
        }

        .app {
            width: min(820px, 100%);
            min-height: 100vh;
            margin: 0 auto;
            padding: 28px 22px 24px;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 21px;
            font-weight: 700;
        }

        .brand-icon {
            font-size: 34px;
            line-height: 1;
        }

        .clear-btn {
            border: 0;
            background: transparent;
            color: var(--muted);
            padding: 8px 0;
            cursor: pointer;
        }

        .clear-btn:hover {
            color: var(--ink);
        }

        .intro {
            padding: 54px 8px 28px;
        }

        .intro h1 {
            margin: 0;
            font-size: clamp(32px, 6vw, 52px);
            line-height: 1.08;
            font-weight: 650;
            letter-spacing: 0;
        }

        .intro-highlight {
            display: inline;
            padding: 0 8px 3px;
            background: var(--soft-blue);
            border-radius: 6px;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }

        .intro p {
            margin: 8px 0 0;
            color: #8a8d91;
            font-size: clamp(22px, 4vw, 34px);
            line-height: 1.2;
        }

        .chat-box {
            flex: 1;
            min-height: 180px;
            padding: 12px 8px 28px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-wrap: anywhere;
        }

        .suggestions {
            width: 100%;
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .suggestion-btn {
            flex: 1 1 0;
            min-width: 0;
            min-height: 54px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 11px 14px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--surface);
            color: var(--ink);
            text-align: left;
            cursor: pointer;
        }

        .suggestion-btn span:first-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .suggestion-btn:hover {
            border-color: #b8c5d8;
            background: #f7fbff;
        }

        .suggestion-arrow {
            flex: 0 0 auto;
            color: var(--accent);
            font-size: 18px;
        }

        .message-row {
            display: flex;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message {
            max-width: min(680px, 88%);
            padding: 13px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .message-row.user .message {
            background: var(--user);
            border-color: #123b70;
            color: #ffffff;
        }

        .typing {
            min-width: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            height: 48px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #85898f;
            animation: typing-dot 1.2s infinite ease-in-out;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.16s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes typing-dot {
            0%, 60%, 100% {
                opacity: 0.35;
                transform: translateY(0);
            }

            30% {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        .composer {
            position: sticky;
            bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 9px 9px 18px;
            border: 1px solid var(--line);
            border-radius: 18px;
            background: var(--surface);
            box-shadow: 0 8px 28px rgba(32, 33, 36, 0.1);
        }

        .composer input {
            width: 100%;
            min-width: 0;
            height: 44px;
            border: 0;
            outline: 0;
            background: transparent;
            color: var(--ink);
        }

        .composer input::placeholder {
            color: #989ba1;
        }

        .send-btn {
            flex: 0 0 auto;
            min-width: 76px;
            height: 42px;
            border: 0;
            border-radius: 12px;
            background: var(--accent);
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #1d57b6;
        }

        .send-btn:disabled {
            cursor: wait;
            background: #9aafce;
        }

        .button-spinner {
            display: block;
            width: 18px;
            height: 18px;
            margin: 0 auto;
            border: 2px solid rgba(255, 255, 255, 0.45);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: button-spin 0.75s linear infinite;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @keyframes button-spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .app {
                padding: 18px 14px 14px;
            }

            .intro {
                padding: 42px 2px 20px;
            }

            .chat-box {
                padding-inline: 0;
            }

            .message {
                max-width: 94%;
            }

            .suggestions {
                overflow-x: auto;
                padding-bottom: 2px;
                scrollbar-width: none;
            }

            .suggestions::-webkit-scrollbar {
                display: none;
            }

            .suggestion-btn {
                flex: 0 0 190px;
            }

            .composer {
                bottom: 10px;
                padding-left: 14px;
            }

            .send-btn {
                min-width: 68px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div class="brand">
                <span class="brand-icon" aria-hidden="true">&#127780;&#65039;</span>
                <span>Weather AI Agent</span>
            </div>

            {% if messages %}
                <form method="POST" action="/clear">
                    <button type="submit" class="clear-btn">New conversation 📧</button>
                </form>
            {% endif %}
        </header>

        <section class="intro">
            <h1><span class="intro-highlight">Hello there! 👋</span></h1>
            <p>How can I help with the weather?</p>
        </section>

        <section class="chat-box" id="chatBox" aria-live="polite">
            {% for msg in messages %}
                <div class="message-row {{ 'user' if msg.type == 'human' else 'agent' }}">
                    <div class="message">{{ msg.content }}</div>
                </div>
            {% endfor %}
        </section>

        {% if not messages %}
            <div class="suggestions" id="suggestions">
                <button type="button" class="suggestion-btn" data-prompt="What is the weather in my current location?">
                    <span>Weather near me</span>
                    <span class="suggestion-arrow" aria-hidden="true">&#8594;</span>
                </button>
                <button type="button" class="suggestion-btn" data-prompt="What is the weather today?">
                    <span>Today's weather</span>
                    <span class="suggestion-arrow" aria-hidden="true">&#8594;</span>
                </button>
                <button type="button" class="suggestion-btn" data-prompt="Should I bring an umbrella?">
                    <span>Bring an umbrella?</span>
                    <span class="suggestion-arrow" aria-hidden="true">&#8594;</span>
                </button>
            </div>
        {% endif %}

        <form method="POST" action="/send" class="composer" id="chatForm">
            <input
                type="text"
                name="message"
                placeholder="Ask about the weather..."
                aria-label="Message"
                autocomplete="off"
                required
                autofocus
            >
            <button type="submit" class="send-btn" id="sendButton">Send</button>
        </form>
    </main>

    <script>
        const chatBox = document.getElementById("chatBox");
        const chatForm = document.getElementById("chatForm");
        const sendButton = document.getElementById("sendButton");
        const messageInput = chatForm.elements.message;

        window.scrollTo({ top: document.body.scrollHeight });

        document.querySelectorAll(".suggestion-btn").forEach(function (button) {
            button.addEventListener("click", function () {
                messageInput.value = button.dataset.prompt;
                chatForm.requestSubmit();
            });
        });

        chatForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const userRow = document.createElement("div");
            userRow.className = "message-row user";

            const userMessage = document.createElement("div");
            userMessage.className = "message";
            userMessage.textContent = messageInput.value.trim();
            userRow.appendChild(userMessage);

            const typingRow = document.createElement("div");
            typingRow.className = "message-row agent";
            typingRow.innerHTML = `
                <div class="message typing" aria-label="Weather Assistant is typing">
                    <span></span><span></span><span></span>
                </div>
            `;

            const suggestions = document.getElementById("suggestions");
            if (suggestions) {
                suggestions.remove();
            }

            chatBox.appendChild(userRow);
            chatBox.appendChild(typingRow);
            sendButton.disabled = true;
            sendButton.innerHTML = `
                <span class="button-spinner" aria-hidden="true"></span>
                <span class="sr-only">Sending</span>
            `;
            window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });

            setTimeout(function () {
                chatForm.submit();
            }, 100);
        });
    </script>
</body>
</html>
